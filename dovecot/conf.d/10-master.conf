# -------------------------------------------------
# IMAP listener services
# -------------------------------------------------
service imap-login {
  inet_listener imap {
  }
  inet_listener imaps {
  }
}

# -------------------------------------------------
# POP3 listener services
# -------------------------------------------------
service pop3-login {
  inet_listener pop3 {
  }
  inet_listener pop3s {
  }
}

# -------------------------------------------------
# Submission listener services
# -------------------------------------------------
service submission-login {
  inet_listener submission {
  }
  inet_listener submissions {
  }
}

# -------------------------------------------------
# LMTP service
# -------------------------------------------------
service lmtp {
  unix_listener lmtp {
  }
}

# -------------------------------------------------
# Mail protocol workers
# -------------------------------------------------
service imap {
}

service pop3 {
}

service submission {
}

# -------------------------------------------------
# Authentication services
# -------------------------------------------------
service auth {
  unix_listener auth-userdb {
  }

  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }

  inet_listener auth {
    port = 12345
  }
}

service auth-worker {
}

# -------------------------------------------------
# Dictionary service
# -------------------------------------------------
service dict {
  unix_listener dict {
  }
}
